<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Spese</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <header>
        <h1>💸 Expense Tracker</h1>
        <p>Gestisci le tue spese facilmente</p>
    </header>

    <div class="dashboard">

        <!-- FORM -->
        <div class="card">
            <h2>Aggiungi Spesa</h2>
            <input type="text" id="descrizione" placeholder="Descrizione">
            <input type="number" id="importo" placeholder="Importo (€)">
            <button onclick="aggiungiSpesa()">Aggiungi</button>
        </div>

        <!-- FILTRI -->
        <div class="card">
            <h2>Filtri</h2>

            <input type="text" id="filtroDescrizione" placeholder="Cerca descrizione">
            <input type="number" id="filtroMin" placeholder="Importo minimo (€)">
            <input type="number" id="filtroMax" placeholder="Importo massimo (€)">

            <button onclick="applicaFiltri()">Applica Filtri</button>
            <button onclick="resetFiltri()">Reset</button>
        </div>

        <!-- TOTALE -->
        <div class="card totale-card">
            <h2>Totale</h2>
            <p>€ <span id="totale">0.00</span></p>
        </div>

        <!-- LISTA -->
        <div class="card lista-card">
            <h2>Spese</h2>
            <ul id="listaSpese"></ul>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
